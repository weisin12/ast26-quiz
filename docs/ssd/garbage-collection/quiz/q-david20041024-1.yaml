author: david20041024
date: 2026-03-18
question: |
  在 SSD 管理中，垃圾回收需要權衡有效空間、資料更新與損耗平衡。
  我們定義一個公式：
  `Score = 0.4 * (1 - u) + 0.3 * age_n + 0.3 * (1 - wear_n)`

  其中：
  - u： 有效資料佔用率。
  - age_n： 區塊年齡 / 當前系統中所有區塊的最大年齡。
  - wear_n： 擦除次數 / 當前系統中所有區塊的最大擦除次數。

  Block：
  - Block A： u = 0.1, age = 1, wear = 3
  - Block B： u = 0.3, age = 2, wear = 2
  - Block C： u = 0.5, age = 3, wear = 1
  
  請問選擇最小有效空間與選擇最大 Score，這兩個選法的 Victim Block 是？

options:
  - text: "A, C"
    correct: true
    explanation: |
      選法一中，最小有效空間是 Block A。
      選法二中，分別計算 Score：
      - Block A：(1-0.1) * 0.4 + (1/3) * 0.3 + (1-1) * 0.3 = 0.46。
      - Block B：(1-0.3) * 0.4 + (2/3) * 0.3 + (1-2/3) * 0.3 = 0.58。
      - Block C：(1-0.5) * 0.4 + (1) * 0.3 + (1-1/3) * 0.3 = 0.7。
      故選擇 Block C。
  - text: "A, A"
    explanation: |
      選法一中，最小有效空間是 Block A。
      選法二中，分別計算 Score 時，如果公式尾端看成 0.3 * wear_n，會算出：
      - Block A：(1-0.1) * 0.4 + (1/3) * 0.3 + (1) * 0.3 = 0.76。
      - Block B：(1-0.3) * 0.4 + (2/3) * 0.3 + (2/3) * 0.3 = 0.68。
      - Block C：(1-0.5) * 0.4 + (1) * 0.3 + (1/3) * 0.3 = 0.6。
      導致選擇 Block A。
  - text: "C, C"
    explanation: |
      選法一中，應該選擇 u 最小的 Block，如果選擇最大的話，會誤選成 Block C。
      選法二中，分別計算 Score：
      - Block A：(1-0.1) * 0.4 + (1/3) * 0.3 + (1-1) * 0.3 = 0.46。
      - Block B：(1-0.3) * 0.4 + (2/3) * 0.3 + (1-2/3) * 0.3 = 0.58。
      - Block C：(1-0.5) * 0.4 + (1) * 0.3 + (1-1/3) * 0.3 = 0.7。
      故選擇 Block C。
  - text: "C, A"
    explanation: |
      選法一中，應該選擇 u 最小的 Block，如果選擇最大的話，會誤選成 Block C。
      選法二中，分別計算 Score 時，如果公式尾端看成 0.3 * wear_n，會算出：
      - Block A：(1-0.1) * 0.4 + (1/3) * 0.3 + (1) * 0.3 = 0.76。
      - Block B：(1-0.3) * 0.4 + (2/3) * 0.3 + (2/3) * 0.3 = 0.68。
      - Block C：(1-0.5) * 0.4 + (1) * 0.3 + (1/3) * 0.3 = 0.6。
      導致選擇 Block A。
